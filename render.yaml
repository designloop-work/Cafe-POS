services:
  - type: web
    name: pos-cafe-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MONGO_URL
        sync: false
      - key: MONGO_DB
        value: pos_cafe
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_REGISTER_SECRET
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 480
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: pos-cafe-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_WS_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
